name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-push:
    name: Build & Push pedido-backend
    runs-on: ubuntu-latest
    environment: cd-dockerhub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: maosuarez/pedido-backend
          tags: |
            # Push a main → dev-<sha> + dev-latest
            type=sha,prefix=dev-,format=short,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=dev-latest,enable=${{ github.ref_type == 'branch' }}
            # Tag Major.Minor.Fix → Major.Minor.Fix + latest
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
